<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>나의 AI 디자인 툴박스</title>
    <style>
        /* 디자이너 취향에 맞춘 깔끔한 미니멀 스타일 */
        :root {
            --bg-color: #f8f9fa;
            --card-bg: #ffffff;
            --text-main: #212529;
            --text-sub: #6c757d;
            --accent: #4f46e5; /* 세련된 인디고 블루 */
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 40px 20px;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
        }
        h1 {
            font-size: 28px;
            margin-bottom: 30px;
            text-align: center;
        }
        .category-section {
            margin-bottom: 40px;
        }
        .category-title {
            font-size: 18px;
            font-weight: bold;
            border-left: 4px solid var(--accent);
            padding-left: 10px;
            margin-bottom: 15px;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }
        .card {
            background: var(--card-bg);
            border: 1px solid #e9ecef;
            border-radius: 12px;
            padding: 20px;
            text-decoration: none;
            color: inherit;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
        }
        .card h3 {
            margin: 0 0 8px 0;
            font-size: 16px;
            color: var(--accent);
        }
        .card p {
            margin: 0;
            font-size: 14px;
            color: var(--text-sub);
            line-height: 1.4;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>🛠️ My AI Design Toolbox</h1>

        <!-- 카테고리 1: 이미지 생성 -->
        <div class="category-section">
            <div class="category-title">이미지 & 에셋 생성</div>
            <div class="grid">
                <a href="https://www.midjourney.com" target="_blank" class="card">
                    <h3>Midjourney</h3>
                    <p>현존 최고의 퀄리티를 자랑하는 AI 이미지 생성 서비스</p>
                </a>
                <a href="https://photoshop.adobe.com" target="_blank" class="card">
                    <h3>Adobe Firefly</h3>
                    <p>포토샵 연동 및 상업적 이용이 안전한 이미지 생성 AI</p>
                </a>
            </div>
        </div>

        <!-- 카테고리 2: UI & 와이어프레임 -->
        <div class="category-section">
            <div class="category-title">UI & 프로토타이핑</div>
            <div class="grid">
                <a href="https://v0.dev" target="_blank" class="card">
                    <h3>v0.dev</h3>
                    <p>프롬프트 입력으로 컴포넌트와 UI 코드를 짜주는 서비스</p>
                </a>
                <!-- 새로운 카드를 넣고 싶다면 여기 아래에 추가하세요! -->
            </div>
        </div>

    </div>

</body>
</html>
